    <style>
        .dynamic-content-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .dynamic-card-media {
            height: 176px;
            overflow: hidden;
            background: #f4f4f4;
        }

        .dynamic-card-media img {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .dynamic-content-card .card-body {
            display: flex;
            flex-direction: column;
            flex: 1 1 auto;
            min-height: 260px;
            padding-top: 1.15rem;
            padding-bottom: 0.55rem;
        }

        .dynamic-card-badges {
            min-height: 2.45rem;
            max-height: 2.45rem;
            overflow: hidden;
            margin-bottom: 0.1rem;
        }

        .dynamic-card-badges .badge {
            margin-bottom: 0.15rem !important;
        }

        .dynamic-card-title {
            min-height: 4.05rem;
            margin-top: 0.2rem;
            margin-bottom: 0.22rem;
            font-size: 1.02rem;
            font-weight: 700;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.35rem;
        }

        .dynamic-card-text {
            min-height: 6.6rem;
            margin-bottom: 0;
            font-size: 0.9rem;
            display: -webkit-box;
            -webkit-line-clamp: 5;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.32rem;
            color: #5c636a;
            flex-grow: 1;
        }

        .dynamic-card-actions {
            padding-top: 0.6rem !important;
            padding-bottom: 1rem !important;
        }

        .dynamic-content-card .card-footer {
            min-height: 84px;
            display: flex;
            align-items: center;
        }

        .dynamic-content-card .card-footer .small {
            line-height: 1.2;
        }

        @media (max-width: 991.98px) {
            .dynamic-card-media {
                height: 168px;
            }

            .dynamic-content-card .card-body {
                min-height: auto;
            }

            .dynamic-card-badges,
            .dynamic-card-title,
            .dynamic-card-text,
            .dynamic-content-card .card-footer {
                min-height: auto;
                max-height: none;
            }
        }
    </style>
